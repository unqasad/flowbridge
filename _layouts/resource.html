<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} - FlowBridge</title>
  <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 150 }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--text:#f4f4f8;--muted:rgba(255,255,255,.78);--green:#a8f03d;--purple:#aa78ff;--soft:rgba(255,255,255,.12);--nav:rgba(13,10,32,.78)}
    body{font-family:"Inter",sans-serif;background:linear-gradient(180deg,#02030b 0%,#04061a 45%,#02030b 100%);color:var(--text);padding:22px}
    .page{max-width:1100px;margin:0 auto}
    .nav{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:18px 24px;margin-bottom:28px;border-radius:24px;background:var(--nav);border:1px solid rgba(255,255,255,.10);backdrop-filter:blur(16px)}
    .brand{font-size:22px;font-weight:800;letter-spacing:-.03em}.green{color:var(--green)}.purple{color:var(--purple)}
    .menu{display:flex;gap:16px;flex-wrap:wrap}.menu a{text-decoration:none;color:rgba(255,255,255,.88);font-size:15px;font-weight:600;padding:10px 14px;border-radius:999px}.menu a.active,.menu a:hover{background:rgba(255,255,255,.06);color:#fff}
    .card{padding:34px;border-radius:32px;background:linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.03)), linear-gradient(180deg, rgba(22,18,52,.84), rgba(11,14,34,.92));border:1px solid var(--soft);box-shadow:0 18px 48px rgba(0,0,0,.24)}
    .eyebrow{display:inline-flex;padding:8px 14px;border-radius:999px;background:linear-gradient(180deg, rgba(168,240,61,.12), rgba(170,120,255,.12));border:1px solid rgba(168,240,61,.22);color:#d5f7a4;font-size:13px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:18px}
    h1{font-size:clamp(38px,5vw,64px);line-height:1;letter-spacing:-.05em;margin-bottom:18px}
    .meta{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:14px;margin-bottom:20px}
    .cover{width:100%;max-height:420px;object-fit:cover;border-radius:24px;border:1px solid var(--soft);margin:8px 0 24px}
    .content{font-size:17px;line-height:1.85;color:var(--muted)}
    .content h2{color:#fff;font-size:28px;line-height:1.2;letter-spacing:-.03em;margin:28px 0 14px}
    .content p,.content ul,.content ol{margin-bottom:16px}
    .content a{color:#d8c6ff}
    .cta{margin-top:30px;padding:24px;border-radius:24px;background:rgba(255,255,255,.04);border:1px solid var(--soft)}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-width:180px;height:52px;padding:0 24px;border-radius:999px;text-decoration:none;font-size:15px;font-weight:600;background:linear-gradient(90deg,#a5f03f 0%,#cfb7ff 100%);color:#19220f;margin-top:16px}
    @media(max-width:760px){body{padding:16px}.nav{flex-direction:column;align-items:flex-start}.card{padding:24px}}
  </style>
</head>
<body>
  <div class="page">
    <header class="nav">
      <div class="brand"><span class="green">Flow</span><span class="purple">Bridge</span></div>
      <nav class="menu">
        <a href="/index.html">Home</a>
        <a href="/resources/" class="{% if page.collection == 'resources' %}active{% endif %}">Resources</a>
        <a href="/insights/" class="{% if page.collection == 'insights' %}active{% endif %}">Insights</a>
        <a href="/services.html">Services</a>
        <a href="/about.html">About</a>
      </nav>
    </header>
    <main class="card">
      {{ content }}
    </main>
  </div>
</body>
</html>
