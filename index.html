<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowBridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --text:#f4f4f8;
      --muted:rgba(255,255,255,0.78);
      --green:#9ef240;
      --purple:#aa78ff;
      --white-border:rgba(255,255,255,0.12);
      --header-bg:rgba(18, 12, 38, 0.72);
      --header-border:rgba(255,255,255,0.10);
    }

    html,body{
      width:100%;
      height:100%;
      font-family:"Inter",sans-serif;
      background:#000;
      color:var(--text);
      overflow:hidden;
    }

    body{
      position:relative;
      transform: scale(0.9);
      transform-origin: top left;
      width:111.11%;
      height:111.11%;
      background:
        radial-gradient(circle at 55% 45%, rgba(96, 55, 170, 0.20), transparent 26%),
        linear-gradient(180deg,#04030d 0%, #070518 46%, #04020c 100%);
    }

    body::before{
      content:"";
      position:absolute;
      inset:-22%;
      z-index:0;
      background:
        radial-gradient(ellipse at 12% 18%, rgba(184, 134, 255, 0.22), transparent 20%),
        radial-gradient(ellipse at 26% 34%, rgba(137, 90, 255, 0.16), transparent 18%),
        radial-gradient(ellipse at 74% 16%, rgba(180, 118, 255, 0.20), transparent 22%),
        radial-gradient(ellipse at 88% 42%, rgba(116, 74, 255, 0.14), transparent 18%),
        radial-gradient(ellipse at 64% 78%, rgba(171, 105, 255, 0.18), transparent 22%),
        radial-gradient(ellipse at 30% 84%, rgba(194, 145, 255, 0.14), transparent 22%),
        radial-gradient(ellipse at 50% 56%, rgba(92, 57, 170, 0.12), transparent 28%);
      filter:blur(95px);
      opacity:1;
      transform:scale(1.08);
    }

    .smoke{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    .smoke span{
      position:absolute;
      border-radius:50%;
      filter:blur(70px);
      opacity:0.16;
      background:rgba(255,255,255,0.92);
      mix-blend-mode:screen;
    }

    .smoke span:nth-child(1){
      width:420px;
      height:180px;
      left:-50px;
      bottom:8px;
      transform:rotate(-8deg);
      opacity:0.19;
    }

    .smoke span:nth-child(2){
      width:360px;
      height:150px;
      left:180px;
      bottom:-24px;
      transform:rotate(10deg);
      opacity:0.14;
    }

    .smoke span:nth-child(3){
      width:430px;
      height:180px;
      right:90px;
      bottom:18px;
      transform:rotate(-12deg);
      opacity:0.16;
    }

    .smoke span:nth-child(4){
      width:310px;
      height:130px;
      right:-20px;
      top:120px;
      transform:rotate(-18deg);
      opacity:0.09;
    }

    .smoke span:nth-child(5){
      width:280px;
      height:120px;
      left:20px;
      top:70px;
      transform:rotate(12deg);
      opacity:0.07;
    }

    .smoke span:nth-child(6){
      width:520px;
      height:200px;
      left:50%;
      bottom:66px;
      transform:translateX(-50%) rotate(4deg);
      opacity:0.12;
    }

    .page{
      position:relative;
      z-index:1;
      width:100%;
      height:100vh;
    }

    .wrap{
      max-width:1240px;
      height:100%;
      margin:0 auto;
      padding:20px 42px 26px;
      display:flex;
      flex-direction:column;
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
      position:relative;
      z-index:2;
      padding:14px 22px;
      border-radius:18px;
      background:var(--header-bg);
      border:1px solid var(--header-border);
      backdrop-filter:blur(16px);
      box-shadow:
        0 10px 30px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .brand{
      font-size:22px;
      font-weight:800;
      letter-spacing:-0.03em;
      line-height:1;
      white-space:nowrap;
    }

    .brand .green{
      color:var(--green);
    }

    .brand .purple{
      color:var(--purple);
    }

    .menu{
      display:flex;
      align-items:center;
      gap:34px;
      margin-right:8px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .menu a{
      position:relative;
      text-decoration:none;
      color:rgba(255,255,255,0.88);
      font-size:14px;
      font-weight:500;
      padding:8px 0;
      transition:all .25s ease;
    }

    .menu a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg,var(--green),var(--purple));
      transform:scaleX(0);
      transform-origin:left;
      transition:transform .25s ease;
    }

    .menu a:hover{
      color:#ffffff;
      text-shadow:0 0 12px rgba(170,120,255,0.35);
    }

    .menu a:hover::after,
    .menu a.active::after{
      transform:scaleX(1);
    }

    .menu a.active{
      color:#ffffff;
    }

    .hero{
      flex:1;
      display:grid;
      grid-template-columns:1.1fr 1fr;
      align-items:center;
      gap:6px;
      min-height:0;
      position:relative;
      z-index:2;
      padding-top:8px;
    }

    .left{
      margin-top:-4px;
      max-width:560px;
      margin-left:40px;
    }



    .eyebrow{
      display:inline-flex;
      align-items:center;
      padding:8px 14px;
      border-radius:999px;
      margin-bottom:18px;
      font-size:13px;
      font-weight:700;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#d8f5a9;
      background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border:1px solid var(--white-border);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
    }

    .title{
      font-size:clamp(44px,4.8vw,68px);
      line-height:1.0;
      font-weight:700;
      letter-spacing:-0.055em;
      max-width:600px;
      text-shadow:0 2px 18px rgba(0,0,0,0.18);
    }

    .title .line{
      display:block;
    }

    .title .accent{
      background:linear-gradient(90deg,#9cf23f 0%,#87ec3d 38%,#b07cff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .desc{
      margin-top:22px;
      max-width:520px;
      font-size:17px;
      line-height:1.8;
      color:var(--muted);
      letter-spacing:-0.01em;
      text-shadow:0 2px 14px rgba(0,0,0,0.14);
    }

    .actions{
      margin-top:34px;
      display:flex;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:186px;
      height:58px;
      padding:0 26px;
      border-radius:999px;
      text-decoration:none;
      font-size:15px;
      font-weight:500;
      letter-spacing:-0.02em;
      transition:transform .2s ease, opacity .2s ease, box-shadow .2s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:.97;
    }

    .btn-primary{
      color:#223018;
      background:linear-gradient(90deg,#a5f03f 0%,#b8ef7d 40%,#cfb7ff 100%);
      box-shadow:
        0 10px 30px rgba(169,112,255,0.18),
        0 0 20px rgba(165,240,63,0.10);
    }

    .btn-secondary{
      color:#f4f5f8;
      background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
      border:1px solid var(--white-border);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 8px 24px rgba(0,0,0,0.24);
      backdrop-filter:blur(12px);
    }

    .right{
      position:relative;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .visual{
      position:relative;
      width:min(42vw,500px);
      max-width:500px;
      aspect-ratio:1/1;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:8px;
      margin-left:-30px;
      overflow:visible;
    }

    .visual::before{
      content:"";
      position:absolute;
      inset:10% 10%;
      background:
        radial-gradient(circle, rgba(168,112,255,0.22) 0%, rgba(103,58,183,0.10) 42%, transparent 72%);
      filter:blur(36px);
      z-index:0;
    }

    .visual img{
      position:relative;
      z-index:1;
      width:100%;
      height:100%;
      object-fit:contain;
      transform:scale(1.2);
      filter:
        drop-shadow(0 24px 60px rgba(0,0,0,0.30))
        drop-shadow(0 0 28px rgba(168,112,255,0.10));
      user-select:none;
      -webkit-user-drag:none;
    }

    @media (max-width:1100px){
      html,body{
        overflow:auto;
      }

      .wrap{
        height:auto;
        min-height:100vh;
        padding:18px 22px 28px;
      }

      .hero{
        grid-template-columns:1fr;
        gap:22px;
        justify-items:center;
        text-align:center;
      }

      .left{
        margin-top:8px;
        max-width:760px;
        margin-left:0;
      }

      .title,
      .desc{
        max-width:760px;
      }

      .actions{
        justify-content:center;
      }

      .visual{
        width:min(72vw,420px);
        margin-top:0;
        margin-left:0;
      }
    }

    @media (max-width:760px){
      .nav{
        flex-direction:column;
        gap:16px;
      }

      .menu{
        gap:14px 18px;
        margin-right:0;
      }

      .title{
        font-size:40px;
      }

      .desc{
        font-size:16px;
        line-height:1.75;
      }

      .btn{
        min-width:160px;
        height:54px;
      }
    }
  </style>
</head>
<body>
  <div class="smoke">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="page">
    <div class="wrap">
      <header class="nav">
        <div class="brand">
          <span class="green">Flow</span><span class="purple">Bridge</span>

        <nav class="menu">

          <a href="resources/">Resources</a>

      <main class="hero">
        <section class="left">
          <div class="eyebrow">FlowBridge</div>

          <h1 class="title">
            <span class="line">Bridging Ideas</span>

          </h1>

          <p class="desc">
            Discover practical resources, insight-led content, and smarter ways to
            learn, build, and grow in the digital space.
          </p>

  rel="nofollow sponsored noopener"

          <div class="actions">
            <a class="btn btn-primary" href="resources/">Explore Resources</a>
            <a class="btn btn-secondary" href="insights/">Discover Insights</a>
          </div>
        </section>

        <section class="right">
          <div class="visual">
            <img src="assets/images/marketing-illustration.png" alt="Marketing illustration">
          </div>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
